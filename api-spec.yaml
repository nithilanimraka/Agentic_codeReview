# ---------- api-spec.yaml ----------
type: Microsoft.App/containerApps
name: api
location: australiaeast

properties:
  environmentId: /subscriptions/70725dd9-0972-44f1-acd5-94ea97d28d1c/resourceGroups/prreview-rg/providers/Microsoft.App/managedEnvironments/prreview-env

  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      targetPort: 8000
      transport: auto

    secrets:
    - name: app-id
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/APP-ID
    - name: webhook-secret
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/WEBHOOK-SECRET
    - name: openai-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/OPENAI-API-KEY
    - name: gemini-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/GEMINI-API-KEY
    - name: google-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/GOOGLE-API-KEY
    - name: google-dep-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/GOOGLE-DEP-API-KEY
    - name: gemini-api-review-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/GEMINI-API-REVIEW-KEY
    - name: randinu-google-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/RANDINU-GOOGLE-API-KEY
    - name: nithila-google-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/NITHILA-GOOGLE-API-KEY
    - name: notion-api-key
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/NOTION-API-KEY
    - name: hf-token
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/HF-TOKEN
    - name: neo4j-password
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/NEO4J-PASSWORD
    - name: prreviewacrazurecrio-prreviewacr
      identity: system
      keyVaultUrl: https://prreview-kv.vault.azure.net/secrets/acr-password



  template:
    containers:
      - name: api
        image: prreviewacr.azurecr.io/prreview-api:latest

        resources:
          cpu: 0.5
          memory: 1Gi
          ephemeralStorage: 2Gi

        env:
          - name: APP_ID
            secretRef: app-id
          - name: WEBHOOK_SECRET
            secretRef: webhook-secret
          - name: OPENAI_API_KEY
            secretRef: openai-api-key
          - name: GEMINI_API_KEY
            secretRef: gemini-api-key
          - name: GOOGLE_API_KEY
            secretRef: google-api-key
          - name: GOOGLE_DEP_API_KEY
            secretRef: google-dep-api-key
          - name: GEMINI_API_REVIEW_KEY
            secretRef: gemini-api-review-key
          - name: RANDINU_GOOGLE_API_KEY
            secretRef: randinu-google-api-key
          - name: NITHILA_GOOGLE_API_KEY
            secretRef: nithila-google-api-key
          - name: NOTION_API_KEY
            secretRef: notion-api-key
          - name: HF_TOKEN
            secretRef: hf-token
          - name: NEO4J_PASSWORD
            secretRef: neo4j-password
          - name: PRIVATE_KEY_PATH
            value: /app/secrets/app.pem
          - name: NEO4J_URI
            value: bolt://neo4j:7687
          - name: NEO4J_USERNAME
            value: neo4j

        volumeMounts:
          - mountPath: /models
            volumeName: prshare
          - mountPath: /app/secrets
            subPath: secrets
            volumeName: prshare

    volumes:
      - name: prshare
        storageType: AzureFile
        storageName: prshare

    scale:
      minReplicas: 1
      maxReplicas: 10
      rules: []
# ---------- end api-spec.yaml ----------
